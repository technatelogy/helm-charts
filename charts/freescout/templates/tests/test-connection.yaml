apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "freescout.fullname" . }}-test-connection"
  labels:
    {{- include "freescout.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
spec:
  containers:
    - name: wget
      image: busybox
      command: ['wget']
      args:
        - '--header=Host: {{ index (.Values.freescout.site_url | split "/") "_2" }}'
        - '{{ include "freescout.fullname" . }}:{{ .Values.service.port }}'
  restartPolicy: Never
